<svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="iron-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d92626"/>
      <stop offset="100%" stop-color="#800000"/>
    </linearGradient>
    <linearGradient id="metal-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#404040"/>
      <stop offset="100%" stop-color="#121212"/>
    </linearGradient>
  </defs>
  <!-- Cyber-Claw Base Shield -->
  <path d="M60 10 L20 30 L30 100 L60 90 L90 100 L100 30 Z" fill="url(#metal-gradient)"/>
  
  <!-- The Claws -->
  <path d="M60 25 Q45 50 45 70 Q60 65 60 75 Q75 65 75 70 Q75 50 60 25 Z" fill="url(#iron-gradient)"/>
  <path d="M35 45 Q25 65 30 85 Q45 75 40 60 Z" fill="url(#iron-gradient)"/>
  <path d="M85 45 Q95 65 90 85 Q75 75 80 60 Z" fill="url(#iron-gradient)"/>
  <path d="M60 85 Q50 95 60 105 Q70 95 60 85 Z" fill="url(#iron-gradient)"/>

  <!-- Cyber Eye Core -->
  <circle cx="60" cy="50" r="10" fill="#ff0000"/>
  <circle cx="60" cy="50" r="5" fill="#ffcccc" opacity="0.9"/>
  <circle cx="60" cy="50" r="2" fill="#000000"/>

  <!-- Accents / Scratches -->
  <path d="M25 40 L35 50" stroke="#d92626" stroke-width="2" stroke-linecap="round"/>
  <path d="M95 40 L85 50" stroke="#d92626" stroke-width="2" stroke-linecap="round"/>
</svg>
