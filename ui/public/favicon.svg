<svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#080B0F"/>
    </linearGradient>
    <linearGradient id="claw-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#00B8D9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="120" height="120" rx="22" fill="url(#bg-grad)"/>

  <!-- Robotic arm shaft (vertical) -->
  <rect x="52" y="18" width="16" height="48" rx="5" fill="url(#claw-grad)" filter="url(#glow)" opacity="0.9"/>

  <!-- Joint circle -->
  <circle cx="60" cy="64" r="10" fill="#080B0F" stroke="url(#claw-grad)" stroke-width="2.5" filter="url(#glow)"/>
  <circle cx="60" cy="64" r="4" fill="url(#claw-grad)"/>

  <!-- Left claw finger -->
  <path d="M60 72 L35 100 L42 104 L64 78 Z" fill="url(#claw-grad)" rx="3" filter="url(#glow)" opacity="0.95"/>

  <!-- Right claw finger -->
  <path d="M60 72 L85 100 L78 104 L56 78 Z" fill="url(#claw-grad)" rx="3" filter="url(#glow)" opacity="0.95"/>

  <!-- Left claw tip accent -->
  <circle cx="38" cy="103" r="3.5" fill="#00E5FF" filter="url(#glow)"/>

  <!-- Right claw tip accent -->
  <circle cx="82" cy="103" r="3.5" fill="#00E5FF" filter="url(#glow)"/>

  <!-- Top grip flange -->
  <rect x="44" y="16" width="32" height="8" rx="4" fill="#B0BEC5" opacity="0.6"/>

  <!-- Cyan electric glow line on arm -->
  <rect x="57" y="20" width="6" height="40" rx="3" fill="#00E5FF" opacity="0.25"/>
</svg>
