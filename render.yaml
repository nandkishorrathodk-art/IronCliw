services:
  - type: web
    name: ironcliw
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: SETUP_PASSWORD
        sync: false
      - key: IRONCLIW_STATE_DIR
        value: /data/.ironcliw
      - key: IRONCLIW_WORKSPACE_DIR
        value: /data/workspace
      - key: IRONCLIW_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: ironcliw-data
      mountPath: /data
      sizeGB: 1
