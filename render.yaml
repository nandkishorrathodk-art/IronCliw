services:
  - type: web
    name: IronCliw
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: SETUP_PASSWORD
        sync: false
      - key: IronCliw_STATE_DIR
        value: /data/.IronCliw
      - key: IronCliw_WORKSPACE_DIR
        value: /data/workspace
      - key: IronCliw_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: IronCliw-data
      mountPath: /data
      sizeGB: 1
